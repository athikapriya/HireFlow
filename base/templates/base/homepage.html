<!DOCTYPE html>
{% load static %}
<html lang="en-US">
<head>
    <!-- =============== meta tags =============== -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=7">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="Django, Django REST Framework, Python, Postgresql, Html, Css, Javascript, Bootstrap">
    <meta name="author" content="Athika Chowdhury Priya">

    <!-- =============== title tag =============== -->
    <title>HireFlow | Connect. Apply. Grow.</title>

    <!-- =============== favicon =============== -->
    <link rel="icon" type="image/webp" href="{% static 'images/logo.webp' %}">

    <!-- =============== google fonts =============== -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

    <!-- =============== bootstrap css cdn =============== -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!-- =============== global css =============== -->
    <link rel="stylesheet" href="{% static 'css/base/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/base/responsive.css' %}">

    <style>
        .btn{
            --bs-btn-border-width: 1px;
            border-radius: 0%;
        }
    </style>

</head>
<body>

    <div class="container d-flex flex-column justify-content-center align-items-center" style="min-height: 100vh;">

        <!-- Title -->
        <h2 class="mb-3">HireFlow</h2>
        <p class="text-muted mb-4 text-center">
            Login or create an account to continue
        </p>

        <!-- Buttons -->
        <div class="d-flex flex-column gap-3 w-100" style="max-width: 300px;">

            <!-- Login -->
            <a href="{% url 'login' %}" class="btn btn-primary mybtn w-100">
                Login
            </a>

            <!-- Candidate Register -->
            <a href="{% url 'candidate_register' %}" class="btn btn-outline-success w-100">
                Register as Candidate
            </a>

            <!-- Employer Register -->
            <a href="{% url 'employer_register' %}" class="btn btn-outline-dark w-100">
                Register as Employer
            </a>

        </div>

    </div>



    <!-- =============== bootstrap js cdn =============== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
